# Deploys KEVMap to Cloudflare Workers on every push to main.
# Required repository secrets (see DEPLOY.md):
#   CLOUDFLARE_API_TOKEN  - API token with Workers Scripts:Edit + D1:Edit
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id

name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build frontend
        working-directory: webui
        run: |
          npm ci
          npm run build

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Apply D1 migrations
        working-directory: worker
        run: npx wrangler d1 migrations apply kevmap --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
